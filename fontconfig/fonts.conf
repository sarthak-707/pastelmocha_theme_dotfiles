<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Custom font defaults. Inter for sans-serif, JetBrainsMono NF Mono
  for monospace, JetBrainsMono NF for the bare "sans" alias.
  Tinos Nerd Font is the proportional NF fallback for terminals.
-->
<fontconfig>

  <!-- Default sans-serif family: Inter (variable font) -->
  <match target="pattern">
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>Cantarell</string>
      <string>Noto Sans</string>
    </edit>
  </match>

  <!-- Default "sans" alias: Inter -->
  <match target="pattern">
    <test qual="any" name="family"><string>sans</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>Cantarell</string>
      <string>Noto Sans</string>
    </edit>
  </match>

  <!-- Default monospace family: JetBrains Mono Nerd Font Mono -->
  <match target="pattern">
    <test qual="any" name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrainsMono Nerd Font Mono</string>
    </edit>
  </match>

  <!-- Default "mono" alias: JetBrains Mono Nerd Font Mono -->
  <match target="pattern">
    <test qual="any" name="family"><string>mono</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrainsMono Nerd Font Mono</string>
    </edit>
  </match>

  <!-- Sans-serif fallback chain -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
      <family>Adwaita Sans</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <!-- Monospace fallback chain -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Iosevka Term Nerd Font Mono</family>
      <family>Hack Nerd Font Mono</family>
      <family>JetBrainsMono Nerd Font Mono</family>
      <family>CaskaydiaCove Nerd Font Mono</family>
      <family>FiraCode Nerd Font Mono</family>
      <family>Adwaita Mono</family>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>

  <!-- Slight hinting + RGBA antialiasing on LCD -->
  <match target="pattern">
    <edit name="hintstyle" mode="prepend"><const>hintslight</const></edit>
    <edit name="antialias" mode="prepend"><bool>true</bool></edit>
    <edit name="rgba" mode="prepend"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="prepend"><const>lcddefault</const></edit>
  </match>

</fontconfig>
